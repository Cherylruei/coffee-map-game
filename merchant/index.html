<!doctype html>
<html lang="zh-TW">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>☕ 咖啡地圖 — 商家後台</title>
    <style>
      * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }
      body {
        font-family: sans-serif;
        background: #1a1a1a;
        color: #eee;
        padding: 24px;
      }
      h1 {
        font-size: 1.5rem;
        margin-bottom: 24px;
      }
      .card {
        background: #2a2a2a;
        border-radius: 12px;
        padding: 20px;
        margin-bottom: 20px;
      }
      label {
        display: block;
        margin-bottom: 6px;
        font-size: 0.85rem;
        color: #aaa;
      }
      input {
        width: 100%;
        padding: 8px 12px;
        border-radius: 8px;
        border: 1px solid #444;
        background: #333;
        color: #eee;
        margin-bottom: 12px;
        font-size: 1rem;
      }
      button {
        padding: 10px 20px;
        border-radius: 8px;
        border: none;
        cursor: pointer;
        background: #c8860a;
        color: #fff;
        font-size: 1rem;
        font-weight: bold;
      }
      button:hover {
        background: #e09a10;
      }
      button:disabled {
        background: #555;
        cursor: not-allowed;
      }
      .result {
        margin-top: 16px;
        font-size: 0.85rem;
      }
      .qr-item {
        background: #333;
        border-radius: 8px;
        padding: 12px;
        margin-bottom: 8px;
      }
      .qr-item .code {
        font-family: monospace;
        font-size: 0.9rem;
      }
      .badge {
        display: inline-block;
        padding: 2px 8px;
        border-radius: 4px;
        font-size: 0.75rem;
        margin-left: 8px;
      }
      .used {
        background: #555;
        color: #aaa;
      }
      .unused {
        background: #1a4a1a;
        color: #4caf50;
      }
      .stats-grid {
        display: grid;
        grid-template-columns: repeat(2, 1fr);
        gap: 12px;
      }
      .stat {
        background: #333;
        border-radius: 8px;
        padding: 12px;
        text-align: center;
      }
      .stat .num {
        font-size: 2rem;
        font-weight: bold;
        color: #c8860a;
      }
      .stat .lbl {
        font-size: 0.8rem;
        color: #aaa;
        margin-top: 4px;
      }

      /* 密碼遮罩 */
      #loginOverlay {
        position: fixed;
        inset: 0;
        background: #111;
        display: flex;
        align-items: center;
        justify-content: center;
        z-index: 999;
      }
      #loginBox {
        background: #2a2a2a;
        border-radius: 16px;
        padding: 40px 32px;
        width: 100%;
        max-width: 360px;
        text-align: center;
      }
      #loginBox h2 {
        margin-bottom: 8px;
        font-size: 1.3rem;
      }
      #loginBox p {
        color: #aaa;
        font-size: 0.85rem;
        margin-bottom: 24px;
      }
      #loginBox input {
        text-align: center;
        letter-spacing: 2px;
      }
      #loginError {
        color: #e05050;
        font-size: 0.85rem;
        margin-top: 8px;
        min-height: 20px;
      }
    </style>
  </head>
  <body>
    <!-- 密碼遮罩 -->
    <div id="loginOverlay">
      <div id="loginBox">
        <h2>☕ 商家後台</h2>
        <p>請輸入工作人員密碼</p>
        <input type="password" id="passwordInput" placeholder="密碼" />
        <button id="loginBtn" onclick="login()" style="width: 100%">
          進入
        </button>
        <div id="loginError"></div>
      </div>
    </div>

    <!-- 主畫面 -->
    <div id="mainContent" style="display: none">
      <h1>☕ 咖啡地圖 — 商家後台</h1>

      <div class="card">
        <h2 style="margin-bottom: 12px">生成抽卡 QR Code</h2>
        <label>數量</label>
        <input type="number" id="quantity" value="10" min="1" max="100" />
        <label>有效天數</label>
        <input type="number" id="expiresInDays" value="30" min="1" />
        <button onclick="generateQR()">生成</button>
        <div class="result" id="generateResult"></div>
      </div>

      <div class="card">
        <h2 style="margin-bottom: 12px">📊 統計數據</h2>
        <button onclick="loadStats()">載入統計</button>
        <div class="stats-grid" id="statsGrid" style="margin-top: 12px"></div>
      </div>

      <div class="card">
        <h2 style="margin-bottom: 12px">QR Code 列表</h2>
        <button onclick="loadQRList()">載入列表</button>
        <div id="qrList" style="margin-top: 12px"></div>
      </div>
    </div>

    <script>
      // ⚙️ 唯一需要改的地方
      // 本地和部署後自動切換，不需要手動改
      const API_BASE = ['localhost', '127.0.0.1'].includes(
        window.location.hostname,
      )
        ? 'http://localhost:3001'
        : 'https://your-frontend.vercel.app'; // 部署後填你的真實網址
      // session token 只存在記憶體，關分頁就消失
      let sessionToken = null;

      // ── 登入（密碼送到伺服器比對，這裡看不到 ADMIN_TOKEN）────
      document
        .getElementById('passwordInput')
        .addEventListener('keydown', (e) => {
          if (e.key === 'Enter') login();
        });

      async function login() {
        const password = document.getElementById('passwordInput').value;
        const btn = document.getElementById('loginBtn');
        const errEl = document.getElementById('loginError');

        btn.disabled = true;
        btn.textContent = '驗證中...';
        errEl.textContent = '';

        try {
          const res = await fetch(`${API_BASE}/api/admin/login`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ password }),
          });
          const data = await res.json();

          if (data.success) {
            sessionToken = data.sessionToken;
            document.getElementById('loginOverlay').style.display = 'none';
            document.getElementById('mainContent').style.display = 'block';
          } else {
            errEl.textContent = data.message || '密碼錯誤';
            document.getElementById('passwordInput').value = '';
            document.getElementById('passwordInput').focus();
          }
        } catch {
          errEl.textContent = '連線失敗，請確認 API 是否正常';
        } finally {
          btn.disabled = false;
          btn.textContent = '進入';
        }
      }

      // ── API 呼叫工具 ──────────────────────────────────
      async function api(path, options = {}) {
        const res = await fetch(`${API_BASE}${path}`, {
          ...options,
          headers: {
            'Content-Type': 'application/json',
            'x-admin-session': sessionToken,
            ...(options.headers || {}),
          },
        });

        // session 過期自動回登入畫面
        if (res.status === 401 || res.status === 403) {
          sessionToken = null;
          document.getElementById('loginOverlay').style.display = 'flex';
          document.getElementById('mainContent').style.display = 'none';
          document.getElementById('loginError').textContent =
            'Session 已過期，請重新登入';
          return null;
        }
        return res.json();
      }

      // ── 生成 QR Code ──────────────────────────────────
      async function generateQR() {
        const quantity = parseInt(document.getElementById('quantity').value);
        const expiresInDays = parseInt(
          document.getElementById('expiresInDays').value,
        );
        const el = document.getElementById('generateResult');
        el.textContent = '生成中...';

        const data = await api('/api/admin/qrcode/generate', {
          method: 'POST',
          body: JSON.stringify({ quantity, expiresInDays }),
        });
        if (!data) return;
        if (!data.success) {
          el.textContent = '失敗：' + data.message;
          return;
        }

        el.innerHTML = data.qrCodes
          .map(
            (q) =>
              `<div class="qr-item">
          <div class="code">${q.code}</div>
          <div style="font-size:0.8rem;color:#888;margin-top:4px">${q.url}</div>
        </div>`,
          )
          .join('');
      }

      // ── 統計 ──────────────────────────────────────────
      async function loadStats() {
        const data = await api('/api/admin/stats');
        if (!data) return;
        if (!data.success) {
          alert('載入失敗');
          return;
        }
        const s = data.stats;
        document.getElementById('statsGrid').innerHTML = `
        <div class="stat"><div class="num">${s.totalUsers}</div><div class="lbl">用戶數</div></div>
        <div class="stat"><div class="num">${s.totalGachas}</div><div class="lbl">抽卡次數</div></div>
        <div class="stat"><div class="num">${s.totalQRCodes}</div><div class="lbl">QR Code 總數</div></div>
        <div class="stat"><div class="num">${s.usedQRCodes}</div><div class="lbl">已使用</div></div>
      `;
      }

      // ── QR Code 列表 ──────────────────────────────────
      async function loadQRList() {
        const data = await api('/api/admin/qrcode/list');
        if (!data) return;
        if (!data.success) {
          alert('載入失敗');
          return;
        }

        document.getElementById('qrList').innerHTML =
          `<p style="margin-bottom:8px;color:#aaa">共 ${data.total} 筆，已用 ${data.used}，未用 ${data.unused}</p>` +
          data.qrCodes
            .map(
              (q) => `
          <div class="qr-item">
            <div class="code">${q.code}
              <span class="badge ${q.used ? 'used' : 'unused'}">${q.used ? '已使用' : '未使用'}</span>
            </div>
            ${
              q.used
                ? `<div style="font-size:0.75rem;color:#888;margin-top:4px">使用時間：${new Date(q.used_at).toLocaleString('zh-TW')}</div>`
                : ''
            }
          </div>
        `,
            )
            .join('');
      }
    </script>
  </body>
</html>
