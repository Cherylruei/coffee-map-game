<!DOCTYPE html>
<html lang="zh-TW">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>QR Code 生成器 - 咖啡地圖管理後台</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
        }

        .header {
            background: white;
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
            margin-bottom: 30px;
        }

        h1 {
            color: #333;
            margin-bottom: 10px;
        }

        .subtitle {
            color: #666;
        }

        .generator-section {
            background: white;
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
            margin-bottom: 30px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
            color: #333;
        }

        input,
        select {
            width: 100%;
            padding: 12px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-size: 16px;
            transition: border-color 0.3s;
        }

        input:focus,
        select:focus {
            outline: none;
            border-color: #667eea;
        }

        .btn {
            background: #667eea;
            color: white;
            border: none;
            padding: 15px 30px;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
        }

        .btn:hover {
            background: #5568d3;
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(102, 126, 234, 0.4);
        }

        .btn:disabled {
            background: #ccc;
            cursor: not-allowed;
            transform: none;
        }

        .qr-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 20px;
            margin-top: 20px;
        }

        .qr-card {
            background: white;
            padding: 20px;
            border-radius: 12px;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.1);
            text-align: center;
        }

        .qr-card canvas {
            margin: 15px auto;
            border: 2px solid #f0f0f0;
            border-radius: 8px;
        }

        .qr-code-text {
            font-family: 'Courier New', monospace;
            font-size: 14px;
            font-weight: bold;
            color: #667eea;
            margin: 10px 0;
            padding: 10px;
            background: #f5f5f5;
            border-radius: 6px;
            word-break: break-all;
        }

        .download-btn {
            background: #28a745;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 14px;
            margin-top: 10px;
            transition: background 0.3s;
        }

        .download-btn:hover {
            background: #218838;
        }

        .alert {
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 20px;
        }

        .alert-success {
            background: #d4edda;
            border: 1px solid #c3e6cb;
            color: #155724;
        }

        .alert-error {
            background: #f8d7da;
            border: 1px solid #f5c6cb;
            color: #721c24;
        }

        .loading {
            display: none;
            text-align: center;
            padding: 20px;
        }

        .loading.active {
            display: block;
        }

        .spinner {
            border: 4px solid #f3f3f3;
            border-top: 4px solid #667eea;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin: 0 auto;
        }

        @keyframes spin {
            0% {
                transform: rotate(0deg);
            }

            100% {
                transform: rotate(360deg);
            }
        }
    </style>
</head>

<body>
    <div class="container">
        <div class="header">
            <h1>☕ 咖啡地圖 QR Code 生成器</h1>
            <p class="subtitle">為店家生成抽卡 QR Code</p>
        </div>

        <div class="generator-section">
            <h2>生成新的 QR Codes</h2>
            <div id="alert"></div>

            <div class="form-group">
                <label for="adminToken">Admin Token</label>
                <input type="password" id="adminToken" placeholder="輸入管理員 Token"
                    value="1a34596bec024bcece18f166a72a455d39809ecdd16ee951">
            </div>

            <div class="form-group">
                <label for="quantity">生成數量</label>
                <input type="number" id="quantity" min="1" max="50" value="1">
            </div>

            <div class="form-group">
                <label for="expiryDays">有效天數</label>
                <input type="number" id="expiryDays" min="1" max="365" value="30">
            </div>

            <button class="btn" onclick="generateQRCodes()">生成 QR Codes</button>

            <div class="loading" id="loading">
                <div class="spinner"></div>
                <p>生成中...</p>
            </div>
        </div>

        <div id="qrCodesContainer"></div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <script>
        // Wait for page to fully load
        window.addEventListener('DOMContentLoaded', function () {
            // Check if QRCode library is available
            if (typeof QRCode === 'undefined') {
                console.error('QRCode library failed to load');
                showAlert('QR Code 庫載入失敗，請重新整理頁面', 'error');
            } else {
                console.log('QRCode library is ready');
            }
        });

        function showAlert(message, type = 'success') {
            const alertDiv = document.getElementById('alert');
            alertDiv.className = `alert alert-${type}`;
            alertDiv.textContent = message;
            setTimeout(() => alertDiv.textContent = '', 5000);
        }

        async function generateQRCodes() {
            const adminToken = document.getElementById('adminToken').value;
            const quantity = parseInt(document.getElementById('quantity').value);
            const expiryDays = parseInt(document.getElementById('expiryDays').value);

            if (!adminToken) {
                showAlert('請輸入 Admin Token', 'error');
                return;
            }

            const loading = document.getElementById('loading');
            loading.classList.add('active');

            try {
                const response = await fetch('http://localhost:3001/api/admin/qrcode/generate', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'x-admin-token': adminToken
                    },
                    body: JSON.stringify({
                        quantity: quantity,
                        expiresInDays: expiryDays
                    })
                });

                const data = await response.json();

                if (data.success) {
                    showAlert(`成功生成 ${data.qrCodes.length} 個 QR Codes！`, 'success');
                    displayQRCodes(data.qrCodes);
                } else {
                    showAlert('生成失敗: ' + data.message, 'error');
                }
            } catch (error) {
                showAlert('錯誤: ' + error.message, 'error');
            } finally {
                loading.classList.remove('active');
            }
        }

        function displayQRCodes(qrCodes) {
            const container = document.getElementById('qrCodesContainer');
            container.innerHTML = '<div class="generator-section"><h2>生成的 QR Codes</h2><div class="qr-grid" id="qrGrid"></div></div>';

            const grid = document.getElementById('qrGrid');

            qrCodes.forEach((qr, index) => {
                const card = document.createElement('div');
                card.className = 'qr-card';

                const title = document.createElement('h3');
                title.textContent = `QR Code ${index + 1}`;
                card.appendChild(title);

                // Create container for QR code
                const qrContainer = document.createElement('div');
                qrContainer.id = `qr-${index}`;
                qrContainer.style.display = 'inline-block';
                qrContainer.style.margin = '15px auto';

                // Check if QRCode library is loaded
                if (typeof QRCode === 'undefined') {
                    const errorMsg = document.createElement('p');
                    errorMsg.textContent = 'QR Code 庫載入失敗，請重新整理頁面';
                    errorMsg.style.color = 'red';
                    card.appendChild(errorMsg);
                } else {
                    try {
                        // Use qrcodejs library
                        new QRCode(qrContainer, {
                            text: qr.code,
                            width: 200,
                            height: 200,
                            colorDark: "#000000",
                            colorLight: "#ffffff",
                            correctLevel: QRCode.CorrectLevel.M
                        });
                        card.appendChild(qrContainer);
                    } catch (error) {
                        console.error('QR Code error:', error);
                        const errorMsg = document.createElement('p');
                        errorMsg.textContent = '錯誤: ' + error.message;
                        errorMsg.style.color = 'red';
                        card.appendChild(errorMsg);
                    }
                }

                const codeText = document.createElement('div');
                codeText.className = 'qr-code-text';
                codeText.textContent = qr.code;
                card.appendChild(codeText);

                const downloadBtn = document.createElement('button');
                downloadBtn.className = 'download-btn';
                downloadBtn.textContent = '下載 QR Code';
                downloadBtn.onclick = () => downloadQRCode(qrContainer, qr.code);
                card.appendChild(downloadBtn);

                grid.appendChild(card);
            });
        }

        function downloadQRCode(qrContainer, code) {
            // qrcodejs creates a canvas inside the container div
            const canvas = qrContainer.querySelector('canvas');
            if (canvas) {
                const link = document.createElement('a');
                link.download = `${code}.png`;
                link.href = canvas.toDataURL();
                link.click();
            } else {
                alert('無法下載 QR Code');
            }
        }
    </script>
</body>

</html>
